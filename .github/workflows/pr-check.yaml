name: PR Check

on:
  pull_request:
    branches: [develop, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.9"
          channel: "stable"

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Create env.json
        run: |
          cat <<EOF > env.json
          {
              "ENV": "dev",
              "API_BASE_URL": "${{ secrets.API_BASE_URL_DEV }}",
              "ENABLE_LOGS": true
          }
          EOF

      - name: Restaura google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Restaura firebase_options.dart
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Check coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info | grep lines | awk '{print $2}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"

          REQUIRED=75
          COVERAGE_INT=${COVERAGE%.*}

          if [ "$COVERAGE_INT" -lt "$REQUIRED" ]; then
            echo "Coverage is below ${REQUIRED}%"
            exit 1
          fi

      - name: Build apk
        run: flutter build apk --debug --dart-define-from-file=env.json

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: dev
          file: build/app/outputs/flutter-apk/app-debug.apk
